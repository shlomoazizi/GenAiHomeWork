<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Card</title>
    <style>
        /* The CSS goes here */
        .card {
            /* Dimensions */
            width: 200px;
            height: 200px;

            /* Background and Border */
            background-color: #e0f7fa; /* Light cyan color */
            border: 5px solid #006064;    /* Dark teal border */

            /* Box Model Spacing */
            padding: 20px;  /* Pushes text away from the border */
            margin: 30px;   /* Pushes the card away from the edge of the page */

            /* Text Styling */
            font-family: Arial, sans-serif;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        This is a styled card. The padding, border, and margin are all working together to define its space!
    </div>

</body>
</html>
