<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>תרגול יחידות REM</title>
    <style>
        /* הגדרת גודל גופן בסיסי של 16 פיקסלים לאלמנט השורש */
        html {
            font-size: 16px;
        }

        /* הגדרת כותרת בגודל של פי 2 מגודל הבסיס */
        h1 {
            font-size: 2rem; /* זה שווה ערך ל-32 פיקסלים (16*2) */
            color: #2c3e50;
        }

        p {
            font-size: 1rem; /* גודל של 16 פיקסלים */
        }
    </style>
</head>
<body>

    <h1>זוהי כותרת בגודל 2rem</h1>
    <p>טקסט רגיל בגודל הבסיס (1rem).</p>

</body>
</html>
